<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>From My Kitchen</title>
  <meta name="theme-color" content="#fbf8f0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=Montserrat:wght@400;500;600&display=swap');
    :root{
      --paper:#fbf8f0; --ink:#27364b; --blue:#315f91; --soft:#e8f0f7;
      --line:#e8dcc7; --card:#fffdf8;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--paper);color:var(--ink)}
    body{font-family:Montserrat,Arial,sans-serif}
    button,input,textarea,select{font:inherit}
    button,a{touch-action:manipulation}
    .app{max-width:923px;margin:0 auto;min-height:100vh;background:var(--paper)}
    .home-canvas{position:relative;width:100%;line-height:0}
    .home-canvas>img{display:block;width:100%;height:auto}
    .hotspot{position:absolute;border:0;background:transparent;cursor:pointer;border-radius:18px}
    .hotspot:focus-visible{outline:4px solid rgba(49,95,145,.55);background:rgba(255,255,255,.15)}
    .search-overlay{
      position:absolute;left:11%;top:36.6%;width:72%;height:4.9%;
      border:0;background:transparent;padding:0 7%;font-family:Caveat,cursive;
      font-size:clamp(18px,3.5vw,34px);color:#333;outline:none;line-height:1;
    }
    .search-overlay::placeholder{color:transparent}
    .add-top{left:67%;top:1%;width:28%;height:8%}
    .cat-all{left:3%;top:41.7%;width:12.5%;height:8.7%}
    .cat-chicken{left:16%;top:41.7%;width:13%;height:8.7%}
    .cat-pasta{left:29.4%;top:41.7%;width:13%;height:8.7%}
    .cat-beef{left:42.7%;top:41.7%;width:13%;height:8.7%}
    .cat-soups{left:56%;top:41.7%;width:13%;height:8.7%}
    .cat-salads{left:69.3%;top:41.7%;width:13%;height:8.7%}
    .cat-more{left:82.6%;top:41.7%;width:13%;height:8.7%}
    .view-all{left:76%;top:51%;width:19%;height:4%}
    .card1{left:3%;top:55.3%;width:18%;height:16.6%}
    .card2{left:21.3%;top:55.3%;width:18%;height:16.6%}
    .card3{left:39.6%;top:55.3%;width:18%;height:16.6%}
    .card4{left:57.9%;top:55.3%;width:18%;height:16.6%}
    .card5{left:76.2%;top:55.3%;width:18%;height:16.6%}
    .nav-home{left:4%;top:87%;width:20%;height:10%}
    .nav-fav{left:28%;top:87%;width:20%;height:10%}
    .nav-list{left:52%;top:87%;width:20%;height:10%}
    .nav-add{left:76%;top:87%;width:20%;height:10%}
    .screen{display:none;min-height:100vh;padding-bottom:92px;background:
      radial-gradient(circle at 10% 5%,rgba(91,130,169,.08),transparent 24%),
      linear-gradient(var(--paper),var(--paper))}
    .screen.active{display:block}
    .topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:16px;
      background:rgba(251,248,240,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
    .icon-btn{border:1px solid var(--line);background:var(--card);border-radius:999px;width:44px;height:44px;
      font-size:24px;cursor:pointer;color:var(--blue)}
    .topbar h1{font-family:Caveat,cursive;font-size:34px;font-weight:500;margin:0;color:var(--blue)}
    .content{padding:18px}
    .paper-card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;
      box-shadow:0 14px 34px rgba(95,75,45,.08);padding:22px;margin-bottom:18px}
    .recipe-title{font-family:Caveat,cursive;font-size:clamp(42px,7vw,68px);line-height:1;color:var(--blue);margin:4px 0 10px}
    .meta{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0 20px}
    .pill{background:var(--soft);border-radius:999px;padding:8px 13px}
    h2{font-family:Caveat,cursive;font-size:36px;color:var(--blue);font-weight:500;margin:12px 0}
    ul,ol{line-height:1.75;padding-left:24px}
    .action-row{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0}
    .action{border:1px solid var(--line);background:var(--card);border-radius:16px;padding:12px 16px;cursor:pointer}
    .action.primary{background:var(--soft);color:var(--blue);font-weight:600}
    .bottom-nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:20;width:min(923px,100%);
      display:grid;grid-template-columns:repeat(4,1fr);background:rgba(255,253,248,.98);
      border-top:1px solid var(--line);padding:max(9px,env(safe-area-inset-bottom)) 4px 8px}
    .bottom-nav button{border:0;background:transparent;padding:7px 2px;color:#333;cursor:pointer}
    .bottom-nav .symbol{display:block;font-size:24px}
    .bottom-nav .label{font-family:Caveat,cursive;font-size:22px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
    .recipe-tile{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:18px;cursor:pointer;text-align:left}
    .recipe-tile h3{font-family:Caveat,cursive;color:var(--blue);font-size:29px;line-height:1.05;margin:0 0 10px}
    .empty{text-align:center;padding:42px 18px;color:#5c6672}
    .form-grid{display:grid;gap:14px}
    input.text,textarea.text,select.text{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:14px;background:#fff}
    textarea.text{min-height:130px}
    @media(max-width:520px){
      .topbar h1{font-size:29px}.content{padding:12px}.paper-card{padding:17px;border-radius:19px}
      .bottom-nav .label{font-size:19px}
    }
  </style>
</head>
<body>
<div class="app">
  <main id="home" class="screen active" aria-label="Home">
    <div class="home-canvas">
      <img src="assets/approved-home.png" alt="From My Kitchen watercolor homepage">
      <input id="homeSearch" class="search-overlay" aria-label="Search recipes or ingredients">
      <button class="hotspot add-top" aria-label="Add recipe" onclick="showScreen('add')"></button>
      <button class="hotspot cat-all" aria-label="All recipes" onclick="showRecipes('All')"></button>
      <button class="hotspot cat-chicken" aria-label="Chicken recipes" onclick="showRecipes('Chicken')"></button>
      <button class="hotspot cat-pasta" aria-label="Pasta recipes" onclick="showRecipes('Pasta')"></button>
      <button class="hotspot cat-beef" aria-label="Beef recipes" onclick="showRecipes('Beef')"></button>
      <button class="hotspot cat-soups" aria-label="Soup recipes" onclick="showRecipes('Soups')"></button>
      <button class="hotspot cat-salads" aria-label="Salad recipes" onclick="showRecipes('Salads')"></button>
      <button class="hotspot cat-more" aria-label="More categories" onclick="showRecipes('All')"></button>
      <button class="hotspot view-all" aria-label="View all recipes" onclick="showRecipes('All')"></button>
      <button class="hotspot card1" aria-label="Creamy Pesto Chicken Pasta Bake" onclick="openRecipe('creamy-pesto-chicken-pasta-bake')"></button>
      <button class="hotspot card2" aria-label="Onion Crunch Chicken" onclick="openRecipe('onion-crunch-chicken')"></button>
      <button class="hotspot card3" aria-label="Caramel S'mores Bars" onclick="openRecipe('caramel-smores-bars')"></button>
      <button class="hotspot card4" aria-label="Homemade Nutter Butters" onclick="openRecipe('homemade-nutter-butters')"></button>
      <button class="hotspot card5" aria-label="Challah Bread" onclick="openRecipe('challah-bread')"></button>
      <button class="hotspot nav-home" aria-label="Home" onclick="goHome()"></button>
      <button class="hotspot nav-fav" aria-label="Favorites" onclick="showScreen('favorites')"></button>
      <button class="hotspot nav-list" aria-label="Shopping list" onclick="showScreen('list')"></button>
      <button class="hotspot nav-add" aria-label="Add recipe" onclick="showScreen('add')"></button>
    </div>
  </main>

  <section id="recipe" class="screen">
    <header class="topbar">
      <button class="icon-btn" onclick="goBack()" aria-label="Back">←</button>
      <h1>From My Kitchen</h1>
      <button class="icon-btn" onclick="goHome()" aria-label="Home" style="margin-left:auto">⌂</button>
    </header>
    <div id="recipeContent" class="content"></div>
  </section>

  <section id="browse" class="screen">
    <header class="topbar">
      <button class="icon-btn" onclick="goBack()" aria-label="Back">←</button>
      <h1 id="browseTitle">All Recipes</h1>
      <button class="icon-btn" onclick="goHome()" aria-label="Home" style="margin-left:auto">⌂</button>
    </header>
    <div class="content">
      <div id="browseGrid" class="grid"></div>
    </div>
  </section>

  <section id="favorites" class="screen">
    <header class="topbar">
      <button class="icon-btn" onclick="goBack()" aria-label="Back">←</button>
      <h1>Favorites</h1>
      <button class="icon-btn" onclick="goHome()" aria-label="Home" style="margin-left:auto">⌂</button>
    </header>
    <div class="content"><div id="favoriteGrid" class="grid"></div></div>
  </section>

  <section id="list" class="screen">
    <header class="topbar">
      <button class="icon-btn" onclick="goBack()" aria-label="Back">←</button>
      <h1>Shopping List</h1>
      <button class="icon-btn" onclick="goHome()" aria-label="Home" style="margin-left:auto">⌂</button>
    </header>
    <div class="content">
      <div class="paper-card">
        <div class="action-row">
          <button class="action" onclick="clearList()">Clear list</button>
        </div>
        <ul id="shoppingItems"></ul>
      </div>
    </div>
  </section>

  <section id="add" class="screen">
    <header class="topbar">
      <button class="icon-btn" onclick="goBack()" aria-label="Back">←</button>
      <h1>Add Recipe</h1>
      <button class="icon-btn" onclick="goHome()" aria-label="Home" style="margin-left:auto">⌂</button>
    </header>
    <div class="content">
      <form class="paper-card form-grid" onsubmit="saveCustomRecipe(event)">
        <input class="text" id="newTitle" required placeholder="Recipe title">
        <select class="text" id="newCategory">
          <option>Chicken</option><option>Pasta</option><option>Beef</option><option>Soups</option>
          <option>Salads</option><option>Sides</option><option>Bakery</option><option>Desserts</option><option>Other</option>
        </select>
        <textarea class="text" id="newIngredients" required placeholder="Ingredients, one per line"></textarea>
        <textarea class="text" id="newSteps" required placeholder="Directions, one step per line"></textarea>
        <button class="action primary" type="submit">Save Recipe</button>
      </form>
    </div>
  </section>

  <nav id="bottomNav" class="bottom-nav" hidden>
    <button onclick="goHome()"><span class="symbol">⌂</span><span class="label">Home</span></button>
    <button onclick="showScreen('favorites')"><span class="symbol">♡</span><span class="label">Favorites</span></button>
    <button onclick="showScreen('list')"><span class="symbol">🛒</span><span class="label">List</span></button>
    <button onclick="showScreen('add')"><span class="symbol">＋</span><span class="label">Add</span></button>
  </nav>
</div>
<script>
let recipes = [];
let historyStack = [];
let currentScreen = 'home';

const customRecipes = JSON.parse(localStorage.getItem('fmkCustomRecipes') || '[]');

const recipesReady = fetch('recipes.json').then(r => {
  if (!r.ok) throw new Error('Could not load recipes.json');
  return r.json();
}).then(data => {
  recipes = [...data, ...customRecipes];
  return recipes;
}).catch(() => {
  recipes = customRecipes;
  return recipes;
});

function pushHistory(next) {
  if (currentScreen !== next) historyStack.push(currentScreen);
  currentScreen = next;
}
function showScreen(id, push=true) {
  if (push) pushHistory(id); else currentScreen=id;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('bottomNav').hidden = id === 'home';
  window.scrollTo({top:0,behavior:'instant'});
  if(id==='favorites') renderFavorites();
  if(id==='list') renderList();
}
function goHome(){
  historyStack=[];
  showScreen('home',false);
}
function goBack(){
  const prev = historyStack.pop();
  if(prev) showScreen(prev,false); else goHome();
}
window.addEventListener('popstate', goHome);

function findRecipe(id){ return recipes.find(r=>r.id===id); }
async function openRecipe(id){
  await recipesReady;
  const r=findRecipe(id); if(!r) return;
  const favs=JSON.parse(localStorage.getItem('fmkFavorites')||'[]');
  const isFav=favs.includes(id);
  document.getElementById('recipeContent').innerHTML=`
    <article>
      <div class="paper-card">
        <div class="recipe-title">${escapeHtml(r.title)}</div>
        <div class="meta">
          <span class="pill">${escapeHtml(r.category||'Recipe')}</span>
          <span class="pill">⏱ ${escapeHtml(r.time||'')}</span>
          <span class="pill">🍽 ${escapeHtml(r.servings||'')}</span>
        </div>
        <div class="action-row">
          <button class="action primary" onclick="toggleFavorite('${r.id}')">${isFav?'♥ Saved':'♡ Favorite'}</button>
          <button class="action" onclick="addRecipeToList('${r.id}')">🛒 Add ingredients</button>
          <button class="action" onclick="window.print()">Print</button>
        </div>
      </div>
      <div class="paper-card">
        <h2>Ingredients</h2>
        <ul>${(r.ingredients||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>
      </div>
      <div class="paper-card">
        <h2>Directions</h2>
        <ol>${(r.steps||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ol>
      </div>
      ${r.note?`<div class="paper-card"><h2>Kitchen Notes</h2><p>${escapeHtml(r.note)}</p></div>`:''}
    </article>`;
  showScreen('recipe');
}
async function showRecipes(category, query=''){
  await recipesReady;
  const title = query ? `Search: ${query}` : (category==='All'?'All Recipes':category);
  document.getElementById('browseTitle').textContent=title;
  const q=query.toLowerCase();
  const list=recipes.filter(r=>{
    const categoryMatch=category==='All'||r.category===category;
    const text=[r.title,r.category,...(r.ingredients||[])].join(' ').toLowerCase();
    return categoryMatch && (!q || text.includes(q));
  });
  renderGrid(document.getElementById('browseGrid'),list);
  showScreen('browse');
}
function renderGrid(el,list){
  if(!list.length){el.innerHTML='<div class="paper-card empty">No recipes found yet.</div>';return;}
  el.innerHTML=list.map(r=>`
    <button class="recipe-tile" onclick="openRecipe('${r.id}')">
      <h3>${escapeHtml(r.title)}</h3>
      <div>${escapeHtml(r.category||'Recipe')} · ${escapeHtml(r.time||'')}</div>
    </button>`).join('');
}
function toggleFavorite(id){
  let favs=JSON.parse(localStorage.getItem('fmkFavorites')||'[]');
  favs=favs.includes(id)?favs.filter(x=>x!==id):[...favs,id];
  localStorage.setItem('fmkFavorites',JSON.stringify(favs));
  openRecipe(id);
  historyStack.pop(); // avoid adding an extra recipe history entry on refresh
}
async function renderFavorites(){
  await recipesReady;
  const favs=JSON.parse(localStorage.getItem('fmkFavorites')||'[]');
  renderGrid(document.getElementById('favoriteGrid'),recipes.filter(r=>favs.includes(r.id)));
}
function addRecipeToList(id){
  const r=findRecipe(id); if(!r)return;
  let items=JSON.parse(localStorage.getItem('fmkShoppingList')||'[]');
  items=[...new Set([...items,...(r.ingredients||[])])];
  localStorage.setItem('fmkShoppingList',JSON.stringify(items));
  alert('Ingredients added to your shopping list.');
}
function renderList(){
  const items=JSON.parse(localStorage.getItem('fmkShoppingList')||'[]');
  document.getElementById('shoppingItems').innerHTML=items.length
    ?items.map((x,i)=>`<li><label><input type="checkbox"> ${escapeHtml(x)}</label></li>`).join('')
    :'<li>Your shopping list is empty.</li>';
}
function clearList(){
  localStorage.removeItem('fmkShoppingList');renderList();
}
function saveCustomRecipe(e){
  e.preventDefault();
  const title=document.getElementById('newTitle').value.trim();
  const r={
    id:'custom-'+Date.now(),title,
    category:document.getElementById('newCategory').value,
    time:'',servings:'',
    ingredients:document.getElementById('newIngredients').value.split('\n').map(x=>x.trim()).filter(Boolean),
    steps:document.getElementById('newSteps').value.split('\n').map(x=>x.trim()).filter(Boolean),
    note:'Added from your From My Kitchen website.'
  };
  const saved=JSON.parse(localStorage.getItem('fmkCustomRecipes')||'[]');
  saved.push(r);localStorage.setItem('fmkCustomRecipes',JSON.stringify(saved));
  recipes.push(r);e.target.reset();openRecipe(r.id);
}
function escapeHtml(s=''){
  return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
document.getElementById('homeSearch').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const q=e.target.value.trim();if(q)showRecipes('All',q);}
});
</script>
</body>
</html>
